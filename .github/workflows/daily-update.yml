name: Daily Repository Update

permissions:
  contents: write
  
on:
  schedule:
    - cron: '30 2 * * *'   # Runs daily at 02:30 UTC
  workflow_dispatch:       # Manual trigger bhi allow karega

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Step for 23f3003492@ds.study.iitm.ac.in
        run: echo "Running scheduled update"

      - name: Make daily commit
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "Daily automated update $(date)" || echo "No changes to commit"
          git push
